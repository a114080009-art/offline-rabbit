<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabbit Run - React Game</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 避免行動裝置長按彈出選單，並優化 Canvas 點擊體驗 */
        canvas {
            touch-action: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #f3f4f6; /* bg-gray-100 */
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 配置區 ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyfBYYD3jR2wwVZ8FYbBgjd5Kv9Bp8aL4Tl-hVDGy71rLCJj_W2EszsNqQC-aoG-FusKQ/exec"; 

        const GRAVITY = 0.6;
        const JUMP_FORCE = -12;
        const INITIAL_SPEED = 6.5;
        const SPEED_ACCEL = 0.001;
        const GROUND_Y = 200;

        function App() {
            const [playerName, setPlayerName] = useState('');
            const [isRegistered, setIsRegistered] = useState(false);
            const [gameActive, setGameActive] = useState(false);
            const [score, setScore] = useState(0);
            const [leaderboard, setLeaderboard] = useState([]);
            const [errorMsg, setErrorMsg] = useState('');
            const [loading, setLoading] = useState(false);
            
            const canvasRef = useRef(null);
            const requestRef = useRef(null);

            // 使用單一 Ref 儲存所有物理狀態
            const state = useRef({
                rabbit: { x: 100, y: GROUND_Y - 40, vy: 0, isJumping: false, rotation: 0, squash: 1, stretch: 1, width: 32, height: 32 },
                obstacles: [],
                speed: INITIAL_SPEED,
                score: 0,
                lastType: null,
                typeCount: 0,
                spawnTimeout: null,
                isInitialized: false
            });

            // 從試算表獲取排行榜
            const fetchLeaderboard = async () => {
                if (!GAS_URL) return;
                try {
                    const response = await fetch(`${GAS_URL}?action=getLeaderboard`);
                    if (!response.ok) throw new Error('Network response was not ok');
                    const data = await response.json();
                    const sortedData = Array.isArray(data) 
                        ? data.sort((a, b) => (b.Score || 0) - (a.Score || 0)).slice(0, 5) 
                        : [];
                    setLeaderboard(sortedData);
                } catch (err) {
                    console.error("讀取排行榜失敗:", err);
                }
            };

            // 註冊玩家並直接開始遊戲
            const handleRegisterAndStart = async () => {
                const trimmedName = playerName.trim();
                if (!trimmedName) {
                    setErrorMsg("請輸入名稱");
                    return;
                }
                
                setLoading(true);
                setErrorMsg("");
                try {
                    await fetch(GAS_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'register',
                            name: trimmedName
                        })
                    });
                    setIsRegistered(true);
                    resetGame();
                    fetchLeaderboard();
                } catch (err) {
                    console.error("註冊過程發生錯誤", err);
                    setIsRegistered(true);
                    resetGame();
                } finally {
                    setLoading(false);
                }
            };

            // 上傳分數函式
            const updateScoreInSheet = async (finalScore) => {
                if (!GAS_URL || !isRegistered) return;
                try {
                    await fetch(GAS_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'updateScore',
                            name: playerName,
                            score: Math.floor(finalScore)
                        })
                    });
                    setTimeout(fetchLeaderboard, 1200);
                } catch (err) {
                    console.error("分數上傳失敗:", err);
                }
            };

            // 障礙物生成邏輯
            const spawnObstacle = () => {
                if (!state.current.isInitialized) return;

                const s = state.current;
                let availableTypes = ['stone'];
                
                if (s.score > 300) availableTypes.push('eagle');
                if (s.score > 500) availableTypes.push('ball');

                let nextType = availableTypes[Math.floor(Math.random() * availableTypes.length)];
                if (s.typeCount >= 2) {
                    let filtered = availableTypes.filter(t => t !== s.lastType);
                    nextType = filtered.length > 0 ? filtered[Math.floor(Math.random() * filtered.length)] : s.lastType;
                }

                s.typeCount = (nextType === s.lastType) ? s.typeCount + 1 : 1;
                s.lastType = nextType;

                const newObs = {
                    type: nextType,
                    x: 850,
                    width: nextType === 'eagle' ? 40 : (nextType === 'ball' ? 36 : 35),
                    height: nextType === 'eagle' ? 20 : (nextType === 'ball' ? 36 : 35),
                    rotation: 0
                };

                if (nextType === 'eagle') {
                    newObs.y = GROUND_Y - 70 - Math.random() * 40;
                } else {
                    newObs.y = GROUND_Y - newObs.height;
                }

                s.obstacles.push(newObs);

                const interval = Math.max(550, 1400 - (s.score * 0.9)) + Math.random() * 600;
                s.spawnTimeout = setTimeout(spawnObstacle, interval);
            };

            const jump = () => {
                if (!state.current.isInitialized || state.current.rabbit.isJumping) return;
                state.current.rabbit.vy = JUMP_FORCE;
                state.current.rabbit.isJumping = true;
                state.current.rabbit.squash = 1.3;
                state.current.rabbit.stretch = 0.7;
            };

            const resetGame = () => {
                if (state.current.spawnTimeout) clearTimeout(state.current.spawnTimeout);
                
                state.current = {
                    rabbit: { x: 100, y: GROUND_Y - 40, vy: 0, isJumping: false, rotation: 0, squash: 1, stretch: 1, width: 32, height: 32 },
                    obstacles: [],
                    speed: INITIAL_SPEED,
                    score: 0,
                    lastType: null,
                    typeCount: 0,
                    spawnTimeout: null,
                    isInitialized: true
                };
                
                setScore(0);
                setGameActive(true);
                setTimeout(spawnObstacle, 1000);
            };

            useEffect(() => {
                if (!gameActive) return;

                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                
                const loop = () => {
                    if (!gameActive) return;
                    const s = state.current;
                    
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    // 1. 地平線
                    ctx.strokeStyle = '#222';
                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(800, GROUND_Y); ctx.stroke();

                    // 2. 兔子物理
                    const r = s.rabbit;
                    r.y += r.vy;
                    r.vy += GRAVITY;
                    
                    if (r.isJumping) {
                        r.rotation
